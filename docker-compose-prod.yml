services:
  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: always

  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: visionalert
      POSTGRES_USER: visionuser
      POSTGRES_PASSWORD: visionpass
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U visionuser -d visionalert"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: always

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: sh entrypoint.sh
    volumes:
      - ./backend:/app
      - static_files:/app/staticfiles
      - media_files:/app/media
      - camera_uploads:/tmp/camera_uploads
    expose:
      - "8000"
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: always

  celery_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: celery -A config worker -l info -Q default,cameras -c 4
    volumes:
      - ./backend:/app
      - camera_uploads:/tmp/camera_uploads
      - media_files:/app/media
    environment:
      - OPENCV_FFMPEG_CAPTURE_OPTIONS=rtsp_transport;tcp
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: always

  celery_beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: celery -A config beat -l info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    volumes:
      - ./backend:/app
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: on-failure

  flower:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: celery -A config flower --port=5555
    expose:
      - "5555"
    env_file:
      - .env
    depends_on:
      - redis
      - backend
    restart: always

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
    restart: "no"
    volumes:
      - frontend_build:/app/frontend

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - static_files:/app/staticfiles:ro
      - media_files:/app/media:ro
      - frontend_build:/app/frontend:ro
      - certbot_www:/var/www/certbot:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - backend
      - frontend
    restart: always

volumes:
  pg_data:
  redis_data:
  static_files:
  media_files:
  camera_uploads:
  frontend_build:
  certbot_www: