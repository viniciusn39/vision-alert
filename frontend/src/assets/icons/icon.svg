<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="VisionAlert">
  <title>VisionAlert</title>
  <!-- fundo arredondado no tom da marca -->
  <rect width="512" height="512" rx="112" fill="#1D9E75"/>
  <!-- corpo da câmera -->
  <g fill="none" stroke="#ffffff" stroke-width="28" stroke-linejoin="round" stroke-linecap="round">
    <rect x="72" y="168" width="272" height="192" rx="32"/>
    <!-- "lente" estendida à direita, formato de triângulo deitado -->
    <path d="M344 232 L432 180 A8 8 0 0 1 444 187 L444 341 A8 8 0 0 1 432 348 L344 296 Z" fill="#ffffff"/>
  </g>
  <!-- badge de alerta (canto superior direito) -->
  <g>
    <circle cx="392" cy="136" r="54" fill="#EF4444" stroke="#ffffff" stroke-width="12"/>
    <rect x="384" y="104" width="16" height="44" rx="4" fill="#ffffff"/>
    <circle cx="392" cy="164" r="8" fill="#ffffff"/>
  </g>
</svg>
