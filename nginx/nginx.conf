events {
    worker_connections 1024;
}
http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    sendfile on;
    keepalive_timeout 65;
    client_max_body_size 100M;
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;
    server {
        listen 80;
        server_name visionalert.com.br www.visionalert.com.br;
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }
        location / {
            return 301 https://$host$request_uri;
        }
    }
    server {
        listen 443 ssl;
        server_name visionalert.com.br www.visionalert.com.br;
        ssl_certificate     /etc/letsencrypt/live/visionalert.com.br/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/visionalert.com.br/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }
        location /static/ {
            alias /app/staticfiles/;
            expires 30d;
        }
        location /media/ {
            alias /app/media/;
            expires 7d;
        }
        location ~ ^/(api|admin|swagger|redoc)/ {
            proxy_pass http://backend:8000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
        location /flower/ {
            proxy_pass http://flower:5555/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
        location / {
            root /app/frontend;
            index index.html;
            try_files $uri $uri/ /index.html;
        }
    }
}
